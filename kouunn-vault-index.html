</script>
<style>
:root{
  --ink:#16181D; --panel:#20242B; --panel-2:#292E36;
  --paper:#F3EFE4; --paper-dim:#DDD8C9;
  --text:#E8E6DF; --faded:#8A8F99;
  --tampon:#D2422A; --ok:#4CAF7D;
  --mono:ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--ink);color:var(--text);
  font-family:system-ui,-apple-system,'PingFang SC','MiSans','Noto Sans SC',sans-serif;min-height:100%;}
body{max-width:560px;margin:0 auto;padding:0 16px 90px;}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 2px 6px;}
header h1{font-size:19px;font-weight:800;letter-spacing:.06em;}
#hRight{display:flex;align-items:center;gap:8px;}
#storageInfo{font-family:var(--mono);font-size:11px;color:var(--faded);}
#syncBtn,#langBtn{background:none;border:1px solid #3A404B;color:var(--faded);font-size:12px;
  padding:4px 10px;border-radius:99px;cursor:pointer;font-family:var(--mono);}

#backupBanner{display:none;margin:8px 0 2px;padding:10px 14px;border-radius:10px;
  font-size:13px;line-height:1.5;background:rgba(210,66,42,.14);
  border:1px solid rgba(210,66,42,.45);color:#F2B4A6;}
#backupBanner.ok{background:rgba(76,175,125,.10);border-color:rgba(76,175,125,.35);color:#9ED8BC;}
#backupBanner b{font-family:var(--mono);}

#captureWrap{margin:16px 0 6px;}
#captureBtn{display:block;width:100%;border:none;cursor:pointer;
  background:var(--paper);color:#1B1D22;border-radius:14px 14px 0 0;
  padding:26px 20px 20px;text-align:center;position:relative;
  box-shadow:0 8px 24px rgba(0,0,0,.45);}
#captureBtn:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(0,0,0,.4);}
#captureBtn .cam{font-size:34px;line-height:1;display:block;margin-bottom:8px;}
#captureBtn .big{font-size:20px;font-weight:800;letter-spacing:.12em;}
#captureBtn .sub{display:block;margin-top:6px;font-size:11px;color:#6E6A5E;
  font-family:var(--mono);letter-spacing:.05em;}
.tear{height:10px;width:100%;
  background:
    linear-gradient(45deg,transparent 33.4%,var(--paper) 33.4%,var(--paper) 66.6%,transparent 66.6%),
    linear-gradient(-45deg,transparent 33.4%,var(--paper) 33.4%,var(--paper) 66.6%,transparent 66.6%);
  background-size:14px 20px;background-position:0 -10px;background-repeat:repeat-x;
  filter:drop-shadow(0 6px 8px rgba(0,0,0,.25));}
#importBtn{display:block;width:100%;margin-top:14px;background:var(--panel);
  border:1px dashed #3A404B;color:var(--faded);border-radius:12px;
  padding:12px;font-size:13px;cursor:pointer;}
#importBtn:active{background:var(--panel-2);}

#noteBar{margin-top:14px;background:var(--panel);border:1px solid #2B303A;
  border-radius:12px;padding:10px 10px 12px;}
#noteChips{display:flex;gap:7px;margin-bottom:9px;align-items:center;flex-wrap:wrap;}
.chip{background:none;border:1px solid #3A404B;color:var(--faded);font-size:12px;
  padding:5px 11px;border-radius:99px;cursor:pointer;}
.chip.on{background:var(--paper);color:#1B1D22;border-color:var(--paper);font-weight:700;}
#nbDate{margin-left:auto;background:var(--panel-2);border:1px solid #3A404B;color:var(--paper-dim);
  border-radius:99px;padding:4px 8px;font-size:11px;font-family:var(--mono);}
#rtToggle{display:none;background:var(--panel-2);border:1px solid #3A404B;
  color:var(--ok);font-size:12px;font-family:var(--mono);padding:5px 12px;border-radius:99px;cursor:pointer;}
#rtToggle.show{display:block;}
#rtToggle.oneway{color:#E0B252;}
#tripBox{display:none;margin-bottom:9px;}
#tripBox.show{display:block;}
#tripRoute{font-family:var(--mono);font-size:12.5px;color:var(--paper-dim);
  background:var(--ink);border:1px dashed #3A404B;border-radius:9px;
  padding:9px 11px;margin-bottom:8px;line-height:1.6;word-break:break-all;}
#suggest{display:flex;flex-wrap:wrap;gap:7px;}
.pchip{background:var(--panel-2);border:1px solid #3A404B;color:var(--text);
  font-size:12.5px;padding:6px 12px;border-radius:99px;cursor:pointer;}
.pchip:active{background:#333945;}
.pchip small{color:var(--faded);font-family:var(--mono);font-size:10px;margin-left:4px;}
.pchip.act{background:none;border-style:dashed;color:var(--faded);}
#inText{width:100%;background:var(--ink);border:1px solid #3A404B;color:var(--text);

  min-height:46px;font-family:inherit;}
#inText:focus{outline:none;border-color:#57606F;}
#inRow{display:flex;gap:7px;margin-top:9px;align-items:center;}
.aBtn{background:var(--ink);border:1px solid #3A404B;color:var(--text);
  font-size:15px;width:40px;height:38px;border-radius:9px;cursor:pointer;flex-shrink:0;}
.aBtn:active{background:var(--panel-2);}
#recBtn.rec{background:var(--tampon);border-color:var(--tampon);animation:pulse 1s infinite;}

#inHint{font-size:11px;color:var(--faded);font-family:var(--mono);margin-left:auto;}
#noteKm{width:70px;display:none;background:var(--ink);border:1px solid #3A404B;color:var(--text);

#noteKm.show{display:block;}
#noteAdd{background:var(--paper);color:#1B1D22;border:none;border-radius:9px;
  padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0;}
#noteAdd:active{background:var(--paper-dim);}
#pendWrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.pend{display:flex;align-items:center;gap:6px;background:var(--panel-2);
  border:1px solid #3A404B;border-radius:9px;padding:5px 8px;font-size:11.5px;max-width:100%;cursor:pointer;}
.pend img{width:30px;height:30px;object-fit:cover;border-radius:5px;}
.pend .px{color:var(--tampon);font-size:14px;padding:0 3px;cursor:pointer;}
.pend .pn{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--faded);}

#afterShot{position:fixed;left:0;right:0;bottom:64px;z-index:50;display:none;
  background:rgba(32,36,43,.97);backdrop-filter:blur(8px);border-top:1px solid #333945;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));}
#afterShot.show{display:block;}
#asInner{max-width:560px;margin:0 auto;}
#asHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
#asTitle{font-size:13.5px;font-weight:700;}
#asHead>div{display:flex;gap:8px;align-items:center;}
#asDate{background:var(--panel-2);border:1px solid #3A404B;color:var(--paper-dim);
  border-radius:99px;padding:4px 8px;font-size:11px;font-family:var(--mono);}
#asRt{background:var(--panel-2);border:1px solid #3A404B;color:var(--ok);
  font-size:11.5px;font-family:var(--mono);padding:4px 10px;border-radius:99px;cursor:pointer;}
#asRt.oneway{color:#E0B252;}
#asClose{background:none;border:none;color:var(--faded);font-size:17px;cursor:pointer;padding:2px 6px;}
#asChips{display:flex;flex-wrap:wrap;gap:7px;}

#searchWrap{margin:20px 0 0;}
#searchBox{width:100%;background:var(--panel);border:1px solid #2B303A;color:var(--text);
  border-radius:99px;padding:10px 16px;font-size:13.5px;}
#searchBox:focus{outline:none;border-color:#57606F;}
#viewTabs{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;}
.vtab{background:none;border:1px solid #3A404B;color:var(--faded);font-size:12.5px;
  padding:6px 14px;border-radius:99px;cursor:pointer;}
.vtab.on{background:var(--paper);color:#1B1D22;border-color:var(--paper);font-weight:700;}

#ledger{margin-top:14px;}
.month{margin-bottom:26px;}
.month-head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 10px;}
.month-title{font-size:15px;font-weight:700;letter-spacing:.04em;}
.month-title small{font-family:var(--mono);color:var(--faded);font-weight:400;font-size:12px;margin-left:8px;}
.month-zip{background:none;border:1px solid #3A404B;color:var(--text);
  font-size:12px;padding:6px 14px;border-radius:99px;cursor:pointer;
  font-family:var(--mono);letter-spacing:.03em;}
.month-zip:active{background:var(--panel-2);}
.month-tear{height:7px;opacity:.16;
  background:
    linear-gradient(45deg,transparent 33.4%,var(--paper) 33.4%,var(--paper) 66.6%,transparent 66.6%),
    linear-gradient(-45deg,transparent 33.4%,var(--paper) 33.4%,var(--paper) 66.6%,transparent 66.6%);
  background-size:10px 14px;background-position:0 -7px;background-repeat:repeat-x;margin-bottom:12px;}
.nlist{margin-bottom:10px;}
.nline{display:flex;gap:9px;align-items:baseline;padding:6px 4px;font-size:13px;
  border-bottom:1px dashed #2B303A;cursor:pointer;line-height:1.45;}
.nline .nd{font-family:var(--mono);font-size:11px;color:var(--faded);flex-shrink:0;}
.nline .nk{flex-shrink:0;font-size:12px;}
.nline .nt{flex:1;min-width:0;word-break:break-word;}
.nline .nkm{font-family:var(--mono);color:var(--ok);flex-shrink:0;font-size:12px;}
.card{background:var(--panel);border:1px solid #2B303A;border-radius:12px;
  padding:11px 13px;margin-bottom:9px;cursor:pointer;}
.card:active{background:var(--panel-2);}
.card .ct{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;}
.card .cd{font-family:var(--mono);font-size:10.5px;color:#B8A06A;letter-spacing:.03em;}
.card .cm{font-family:var(--mono);font-size:10.5px;color:var(--faded);}
.card .tx{font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
.item{display:flex;gap:10px;align-items:flex-start;padding:5px 0;font-size:14px;line-height:1.5;}
.item .cb{flex-shrink:0;width:19px;height:19px;border:1.6px solid var(--faded);border-radius:50%;
  margin-top:1px;display:flex;align-items:center;justify-content:center;color:transparent;font-size:12px;}
.item.done .cb{background:var(--ok);border-color:var(--ok);color:#0F1512;}
.item.done .it{text-decoration:line-through;color:var(--faded);}
.item .it{flex:1;word-break:break-word;}
.attsGrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.att{position:relative;cursor:pointer;}
.att img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid #2B303A;display:block;}
.att .vtag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.att .vdur{position:absolute;right:3px;bottom:3px;font-family:var(--mono);font-size:9px;
  background:rgba(0,0,0,.7);color:#eee;padding:1px 4px;border-radius:4px;}
.attChip{display:flex;align-items:center;gap:7px;background:var(--panel-2);
  border:1px solid #3A404B;border-radius:99px;padding:7px 13px;font-size:12px;cursor:pointer;}
.attChip.playing{border-color:var(--paper);color:var(--paper);}
.geoTag{font-family:var(--mono);font-size:10px;color:var(--faded);margin-top:6px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.thumb{position:relative;aspect-ratio:3/4;border-radius:8px;overflow:hidden;
  background:var(--panel);cursor:pointer;border:1px solid #2B303A;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb.pdf{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:var(--paper);}
.thumb.pdf .tag{font-weight:800;font-size:15px;letter-spacing:.12em;color:#B3402C;font-family:var(--mono);}
.thumb.pdf .fn{font-size:8.5px;padding:0 5px;text-align:center;color:#6E6A5E;
  max-height:2.6em;overflow:hidden;word-break:break-all;line-height:1.3;}
.thumb .d{position:absolute;left:0;right:0;bottom:0;font-family:var(--mono);
  font-size:9.5px;text-align:center;padding:3px 0 2px;color:var(--paper-dim);
  background:linear-gradient(transparent,rgba(0,0,0,.78) 55%);letter-spacing:.02em;}
#empty{margin-top:40px;text-align:center;color:var(--faded);font-size:13.5px;line-height:2;}
#empty .n{font-size:30px;display:block;margin-bottom:6px;opacity:.6;}

#footBar{position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:rgba(22,24,29,.92);backdrop-filter:blur(10px);border-top:1px solid #262B33;}
#footInner{max-width:560px;margin:0 auto;display:flex;gap:10px;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));}
#exportAll{flex:1;background:var(--paper);color:#1B1D22;border:none;font-weight:700;
  font-size:14px;padding:12px;border-radius:10px;cursor:pointer;letter-spacing:.05em;}
#exportAll:active{background:var(--paper-dim);}
#exportAll:disabled{opacity:.35;}
#persistTag{display:flex;align-items:center;font-family:var(--mono);
  font-size:10.5px;color:var(--faded);white-space:nowrap;}

#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--paper);color:#1B1D22;font-size:13px;font-weight:600;
  padding:10px 18px;border-radius:99px;opacity:0;pointer-events:none;
  transition:.25s;z-index:98;box-shadow:0 6px 20px rgba(0,0,0,.5);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#closeGate{position:fixed;inset:0;z-index:90;background:rgba(12,13,17,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center;}
#closeGate.open{display:flex;}
#closeGate .gi{font-size:44px;margin-bottom:14px;}
#closeGate h2{font-size:21px;letter-spacing:.04em;margin-bottom:10px;}
#closeGate p{color:var(--faded);font-size:13.5px;line-height:1.7;max-width:300px;margin-bottom:26px;}
#gateExport{background:var(--paper);color:#1B1D22;border:none;font-weight:800;
  font-size:16px;padding:16px 30px;border-radius:12px;cursor:pointer;letter-spacing:.06em;
  box-shadow:0 8px 24px rgba(0,0,0,.5);}
#gateExport:active{transform:translateY(2px);}
#gateLater{background:none;border:none;color:var(--faded);font-size:12.5px;
  margin-top:18px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}

#viewer{position:fixed;inset:0;z-index:80;background:rgba(10,11,14,.96);display:none;flex-direction:column;}
#viewer.open{display:flex;}
#vImgWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:14px;}
#vImg{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.6);}
#vBar{padding:12px 16px calc(16px + env(safe-area-inset-bottom));
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  background:var(--ink);border-top:1px solid #262B33;}
#vLabel{width:100%;background:var(--panel);color:var(--text);border:1px solid #3A404B;
  border-radius:8px;padding:9px 10px;font-size:14px;}
#vDate{font-family:var(--mono);background:var(--panel);color:var(--text);
  border:1px solid #3A404B;border-radius:8px;padding:9px 10px;font-size:14px;flex:1;min-width:150px;}
.vBtn{border:none;border-radius:8px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;}
#vDel{background:rgba(210,66,42,.15);color:#F0977F;border:1px solid rgba(210,66,42,.5);}
#vClose{background:var(--paper);color:#1B1D22;}
#vInfo{width:100%;font-family:var(--mono);font-size:11px;color:var(--faded);}

#imgView{position:fixed;inset:0;z-index:96;background:rgba(8,9,12,.97);display:none;
  align-items:center;justify-content:center;padding:14px;}
#imgView.open{display:flex;}
#imgView img{max-width:100%;max-height:92%;border-radius:8px;}
#ivCap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(14px + env(safe-area-inset-bottom));
  text-align:center;font-family:var(--mono);font-size:11px;color:var(--faded);background:rgba(8,9,12,.8);}

#nEdit{position:fixed;inset:0;z-index:85;background:rgba(10,11,14,.9);display:none;
  align-items:flex-end;justify-content:center;}
#nEdit.open{display:flex;}
#nCard{width:100%;max-width:560px;background:var(--panel);border-radius:16px 16px 0 0;
  padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid #333945;}
#nCard h3{font-size:15px;margin-bottom:4px;letter-spacing:.03em;}
#neMeta{font-family:var(--mono);font-size:10.5px;color:var(--faded);margin-bottom:12px;line-height:1.7;}
#nCard .row{display:flex;gap:8px;margin-bottom:10px;}
#nCard input,#nCard textarea{background:var(--ink);border:1px solid #3A404B;color:var(--text);
  border-radius:9px;padding:11px 12px;font-size:14px;}
#neDate{font-family:var(--mono);flex:1;}
#neKm{font-family:var(--mono);width:84px;}
#neRemind{background:var(--panel-2);border:1px solid #3A404B;color:var(--paper);
  border-radius:9px;padding:0 15px;font-size:16px;cursor:pointer;}
#neText{width:100%;line-height:1.6;resize:vertical;min-height:96px;font-family:inherit;}
#neAtts{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
#nBtns{display:flex;gap:10px;margin-top:14px;}
#neSave{flex:1;background:var(--paper);color:#1B1D22;border:none;border-radius:9px;
  padding:12px;font-weight:800;font-size:14px;cursor:pointer;}
#neDel{background:rgba(210,66,42,.15);color:#F0977F;border:1px solid rgba(210,66,42,.5);
  border-radius:9px;padding:12px 16px;font-size:13.5px;cursor:pointer;}
#neCancel{background:none;border:1px solid #3A404B;color:var(--faded);
  border-radius:9px;padding:12px 16px;font-size:13.5px;cursor:pointer;}

.sheet{position:fixed;inset:0;z-index:88;background:rgba(10,11,14,.9);display:none;
  align-items:flex-end;justify-content:center;}
.sheet.open{display:flex;}
.sheetCard{width:100%;max-width:560px;background:var(--panel);border-radius:16px 16px 0 0;
  padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid #333945;
  display:flex;flex-direction:column;gap:10px;}
.sBtn{border:none;border-radius:9px;padding:14px;font-size:13.5px;font-weight:600;cursor:pointer;}
.sBtn.pri{background:var(--paper);color:#1B1D22;font-weight:800;}
.sBtn.sec{background:var(--panel-2);color:var(--text);border:1px solid #3A404B;}
.sBtn.ghost{background:none;color:var(--faded);border:1px solid #3A404B;padding:12px;}

#rmWhen{width:100%;background:var(--ink);border:1px solid #3A404B;color:var(--text);
  border-radius:9px;padding:11px 12px;font-size:14px;font-family:var(--mono);margin-bottom:10px;}
#rmTitleTx{font-size:12px;color:var(--faded);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rq,.ro{background:none;border:1px solid #3A404B;color:var(--faded);font-size:12px;
  padding:5px 12px;border-radius:99px;cursor:pointer;}
.ro.on{background:var(--paper);color:#1B1D22;border-color:var(--paper);font-weight:700;}

@media (min-width:430px){.grid{grid-template-columns:repeat(5,1fr);}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<body>

<header>
  <h1 id="appTitle">KOUUNN仓</h1>
  <div id="hRight">
    <div id="storageInfo"></div>
    <button id="syncBtn">⇅</button>
    <button id="langBtn">中</button>
  </div>
</header>

<div id="backupBanner"></div>

<div id="captureWrap">

    <span class="big" id="tSnap"></span>
    <span class="sub" id="tSnapSub"></span>
  </button>
  <div class="tear"></div>
  <button id="importBtn"></button>
</div>

<input type="file" id="camInput" accept="image/*" capture="environment" hidden>
<input type="file" id="galInput" accept="image/*,application/pdf" multiple hidden>

<div id="noteBar">
  <div id="noteChips">
    <button class="chip on" data-k="memo" id="tChipMemo"></button>

    <input type="date" id="nbDate">

  <div id="tripBox">

  </div>
  <textarea id="inText" rows="2"></textarea>
  <div id="inRow">
    <button class="aBtn" id="recBtn">🎤</button>
    <button class="aBtn" id="imgBtn">📷</button>
    <button class="aBtn" id="vidBtn">🎬</button>
    <button class="aBtn" id="fileBtn">📎</button>

    <input type="number" inputmode="decimal" id="noteKm" placeholder="km">
    <button id="noteAdd"></button>
  </div>
  <div id="pendWrap"></div>
  <input type="file" id="imgIn" accept="image/*" multiple hidden>
  <input type="file" id="vidIn" accept="video/*" multiple hidden>

<div id="afterShot">
  <div id="asInner">
    <div id="asHead">

<div id="searchWrap"><input id="searchBox" type="search"></div>
<div id="viewTabs">
  <button class="vtab on" data-v="all" id="tTabAll"></button>
  <button class="vtab" data-v="recu" id="tTabRecu"></button>
  <button class="vtab" data-v="memo" id="tTabMemo"></button>
  <button class="vtab" data-v="km" id="tTabKm"></button>
</div>
<div id="ledger"></div>
<div id="empty" style="display:none">
  <span class="n">🧾</span><span id="tEmpty"></span>
</div>

<div id="footBar">
  <div id="footInner">
    <button id="exportAll"></button>
    <div id="persistTag">…</div>

</div>

<div id="toast"></div>

<div id="closeGate">

<div id="imgView"><img id="ivImg" alt=""><div id="ivCap"></div></div>

  <div id="nCard">

  </div>

  <div class="sheetCard">
    <button class="sBtn pri" id="bkExport"></button>
    <button class="sBtn sec" id="bkImport"></button>
    <button class="sBtn sec" id="notesCopy"></button>
    <button class="sBtn sec" id="notesCsv"></button>

/* ============ 常量/DB ============ */
const DB_NAME='recu-vault',STORE='receipts',LONG_EDGE=1200,QUALITY=0.65,THUMB_EDGE=260,
      WARN_DAYS=35,BASE='KOUUNN',FILE_LIMIT=10*1048576;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});s.createIndex('by_date','dateKey');
      }
      if(!d.objectStoreNames.contains('notes'))d.createObjectStore('notes',{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=()=>rej(r.error);
  });
}
const tx=m=>db.transaction(STORE,m).objectStore(STORE);
const ntx=m=>db.transaction('notes',m).objectStore('notes');
const P=q=>new Promise((res,rej)=>{q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});
const dbPut=r=>P(tx('readwrite').put(r)),dbDel=i=>P(tx('readwrite').delete(i)),dbAll=()=>P(tx('readonly').getAll());
const notePut=r=>P(ntx('readwrite').put(r)),noteDel=i=>P(ntx('readwrite').delete(i)),noteAll=()=>P(ntx('readonly').getAll());

/* ============ 工具 ============ */
const pad=n=>String(n).padStart(2,'0');
const dateKeyOf=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const monthOf=k=>k.slice(0,7);
const hm=ts=>{const d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes());};
const fmtKm=v=>Math.round(v*10)/10;
const uid=p=>(p||'')+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function toast(msg,ms=1800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),ms);
}
function blobToB64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;r.readAsDataURL(blob);
  });
}
function b64ToBlob(b64,type){
  const bin=atob(b64),arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:type||'application/octet-stream'});
}
function dlBlob(name,blob){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},4000);
}

/* ============ 记事锁(邮筒模型:投递免钥匙,翻阅要钥匙) ============ */
let notesUnlocked=false;
async function sha(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('inbox-salt:'+s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function askUnlock(cb){
  const has=!!localStorage.getItem('pinHash');
  let stage1='';
  const msg=has?t('lockAsk'):t('lockSet');
  const go=async(promptMsg)=>{
    const v=prompt(promptMsg);
    if(v===null)return;
    if(!/^\d{4,8}$/.test(v.trim())){go(t('lockDigits')+'\n'+msg);return;}
    const pv=v.trim();
    if(!localStorage.getItem('pinHash')){
      if(!stage1){stage1=pv;go(t('lockAgain'));return;}
      if(pv!==stage1){stage1='';go(t('lockDiff'));return;}
      localStorage.setItem('pinHash',await sha(pv));
      notesUnlocked=true;toast(t('lockOk'));render();if(cb)cb();
      return;
    }
    if(await sha(pv)===localStorage.getItem('pinHash')){
      notesUnlocked=true;toast(t('lockOk'));render();if(cb)cb();
    }else{go(t('lockBad'));}
  };
  go(msg);
}

/* ============ 地点库 ============ */
function loadPlaces(){
  try{
    let p=JSON.parse(localStorage.getItem('kmPlaces2')||'null');
    if(!p){
      p={};
      const old=JSON.parse(localStorage.getItem('kmPlaces')||'{}');
      for(const k in old)p[k]={km:old[k],n:1,t:0};
      localStorage.setItem('kmPlaces2',JSON.stringify(p));
    }
    return p;
  }catch(e){return {};}
}
const savePlaces=p=>localStorage.setItem('kmPlaces2',JSON.stringify(p));
function learnPlace(name,oneway){
  if(!name||name===BASE||!(oneway>0))return;
  const p=loadPlaces();
  const e=p[name]||{km:0,n:0,t:0};
  e.km=fmtKm(oneway);e.n++;e.t=Date.now();
  p[name]=e;savePlaces(p);
}
function topPlaces(filter,max=6){
  const p=loadPlaces();
  let list=Object.keys(p);
  if(filter){const f=filter.toLowerCase();list=list.filter(n=>n.toLowerCase().includes(f));}
  list.sort((a,b)=>(p[b].t-p[a].t)||(p[b].n-p[a].n));
  return list.slice(0,max).map(n=>({name:n,km:p[n].km,u:p[n].u||0}));
}

/* ============ 图像/视频处理 ============ */
async function loadBitmap(file){
  try{return await createImageBitmap(file,{imageOrientation:'from-image'});}
  catch(e){
    try{return await createImageBitmap(file);}
    catch(e2){
      return new Promise((res,rej)=>{
        const url=URL.createObjectURL(file),img=new Image();
        img.onload=()=>{URL.revokeObjectURL(url);res(img);};
        img.onerror=rej;img.src=url;
      });
    }
  }
}
function drawScaled(src,maxEdge,q){
  const w0=src.width||src.naturalWidth,h0=src.height||src.naturalHeight;
  const sc=Math.min(1,maxEdge/Math.max(w0,h0));
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(w0*sc));c.height=Math.max(1,Math.round(h0*sc));
  c.getContext('2d').drawImage(src,0,0,c.width,c.height);
  return new Promise(res=>c.toBlob(res,'image/jpeg',q));
}
async function compress(file){
  const bmp=await loadBitmap(file);
  const blob=await drawScaled(bmp,LONG_EDGE,QUALITY);
  const thumb=await drawScaled(bmp,THUMB_EDGE,0.6);
  if(bmp.close)bmp.close();
  return {blob,thumb};
}
function videoThumb(file){
  return new Promise(res=>{
    const url=URL.createObjectURL(file);
    const v=document.createElement('video');
    v.preload='metadata';v.muted=true;v.playsInline=true;v.src=url;
    let dur=null;
    function fin(thumb){URL.revokeObjectURL(url);res({thumb:thumb,dur:dur});}
    v.onloadeddata=()=>{dur=v.duration;try{v.currentTime=Math.min(0.5,(v.duration||1)/2);}catch(e){fin(null);}};
    v.onseeked=()=>{
      try{
        const sc=Math.min(1,260/Math.max(v.videoWidth,v.videoHeight));
        const c=document.createElement('canvas');
        c.width=Math.max(1,Math.round(v.videoWidth*sc));
        c.height=Math.max(1,Math.round(v.videoHeight*sc));
        c.getContext('2d').drawImage(v,0,0,c.width,c.height);
        c.toBlob(b=>fin(b),'image/jpeg',0.6);
      }catch(e){fin(null);}
    };
    v.onerror=()=>fin(null);
  });
}

let mediaRec=null,recChunks=[],recT0=0;
const recBtn=document.getElementById('recBtn');
async function startRec(){
  if(mediaRec&&mediaRec.state==='recording')return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream);
    recChunks=[];recT0=Date.now();
    mediaRec.ondataavailable=ev=>recChunks.push(ev.data);
    mediaRec.onstop=()=>{
      stream.getTracks().forEach(x=>x.stop());
      const dur=Math.round((Date.now()-recT0)/1000);
      if(dur<1){toast(t('tooShort'));return;}
      const blob=new Blob(recChunks,{type:mediaRec.mimeType||'audio/webm'});
      pendingAtts.push({id:uid('a'),kind:'audio',name:t('audioName'),mime:blob.type,size:blob.size,dur:dur,blob:blob,thumb:null});
      renderPending();
    };
    mediaRec.start();
    recBtn.classList.add('rec');
  }catch(e){toast(t('micNA'));}
}
function stopRec(){
  if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();
  recBtn.classList.remove('rec');
}

recBtn.addEventListener('pointerup',stopRec);

function getGeo(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:+p.coords.latitude.toFixed(5),lng:+p.coords.longitude.toFixed(5),acc:Math.round(p.coords.accuracy)}),
      ()=>res(null),{timeout:2500,maximumAge:300000});
  });
}
function attDesc(a){
  if(a.kind==='img')return t('attImg',a.name||'');

  if(a.kind==='vref')return t('attVid',a.name,a.dur?Math.round(a.dur):'');
  if(a.kind==='fref')return t('attFref',a.name,(a.size/1048576).toFixed(1));

}

let lastShotIds=[];
async function ingest(files,useFileTime,fromCamera){
  if(!files.length)return;
  toast(t('tCompress'),60000);
  let n=0;
  if(fromCamera)lastShotIds=[];
  for(const f of files){
    try{
      const isPdf=f.type==='application/pdf'||/\.pdf$/i.test(f.name||'');
      let blob,thumb=null;
      if(isPdf){blob=f;}
      else{const r=await compress(f);blob=r.blob;thumb=r.thumb;}
      const ts=useFileTime&&f.lastModified?f.lastModified:Date.now();
      const rid=Date.now()+'-'+Math.random().toString(36).slice(2,7);
      await dbPut({id:rid,capturedAt:Date.now(),dateKey:dateKeyOf(ts),
        type:isPdf?'pdf':'img',name:f.name||'',blob,thumb,size:blob.size});
      if(fromCamera)lastShotIds.push(rid);
      n++;
    }catch(e){console.error(e);}
  }
  toast(t('tSaved',n));
  render();
  if(fromCamera&&n>0)showAfterShot();
}

let noteKind='memo',tripRound=true,focusT0=null;
document.getElementById('inText').addEventListener('focus',()=>{if(!focusT0)focusT0=Date.now();});
function parseTokens(v){
  v=String(v||'').trim();
  if(!v)return [];
  return v.split(/[→,，、\/\n]+/).map(s=>s.trim()).filter(s=>s&&s!==BASE);
}
function routeTextOf(tokens,round){
  if(!tokens.length)return BASE;
  return BASE+' → '+tokens.join(' → ')+(round?' → '+BASE:'');
}
function kmFor(tokens){
  const p=loadPlaces();
  if(tokens.length===1){
    const e=p[tokens[0]];
    if(e)return e.km;
  }else if(tokens.length>1){
    const e=p[tokens.join(' ')];
    if(e&&e.u)return e.km;
  }
  return null;
}
let kmAuto=null;
function syncTrip(){
  if(noteKind!=='km')return;
  const tokens=parseTokens(document.getElementById('inText').value);
  const isUnit=tokens.length>1;
  const f=document.getElementById('noteKm');
  const k=kmFor(tokens);
  if(k!=null&&(f.value===''||f.value==String(kmAuto))){f.value=k;kmAuto=k;}
  const val=parseFloat(f.value);
  let tot=null;
  if(val>0)tot=isUnit?fmtKm(val):fmtKm(val*(tripRound?2:1));
  document.getElementById('tripRoute').textContent=
    routeTextOf(tokens,isUnit?true:tripRound)+(tot?'   ≈ '+tot+' km':'');
}
function renderSuggest(filter){
  const box=document.getElementById('suggest');
  box.innerHTML='';
  for(const pl of topPlaces(filter,6)){
    const b=document.createElement('button');b.className='pchip';
    b.textContent=pl.name;
    const s=document.createElement('small');
    s.textContent=pl.km+'km'+(pl.u?' ⇄':'');
    b.appendChild(s);
    b.onclick=()=>{
      const tEl=document.getElementById('inText');
      if(pl.u){tEl.value=pl.name;document.getElementById('noteKm').value=pl.km;kmAuto=pl.km;}
      else{
        const tokens=parseTokens(tEl.value);
        if(tokens[tokens.length-1]!==pl.name)tokens.push(pl.name);
        tEl.value=tokens.join(' ');
      }
      syncTrip();
      const p=loadPlaces();if(p[pl.name]){p[pl.name].t=Date.now();savePlaces(p);}
    };
    b.oncontextmenu=e=>{
      e.preventDefault();
      if(confirm(t('confDelPlace',pl.name))){
        const p=loadPlaces();delete p[pl.name];savePlaces(p);renderSuggest('');
      }
    };
    box.appendChild(b);
  }
  const clr=document.createElement('button');clr.className='pchip act';
  clr.textContent=t('clear');
  clr.onclick=()=>{document.getElementById('inText').value='';document.getElementById('noteKm').value='';kmAuto=null;syncTrip();renderSuggest('');};
  box.appendChild(clr);
  const yr=document.createElement('button');yr.className='pchip act';
  yr.textContent=t('yearBtn');yr.onclick=yearReport;
  box.appendChild(yr);
}

async function addNote(){
  const tEl=document.getElementById('inText'),kEl=document.getElementById('noteKm');
  let raw=tEl.value;
  let text=raw.trim();
  const km=parseFloat(kEl.value);
  const lines=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!text&&!(km>0)&&!pendingAtts.length){toast(t('tSay'));return;}
  const now=Date.now();
  const dur=focusT0?Math.round((now-focusT0)/1000):null;
  const dk=document.getElementById('nbDate').value||dateKeyOf(now);
  const geo=await getGeo();
  const rec={id:uid('n'),capturedAt:now,dateKey:dk,kind:noteKind,
    atts:pendingAtts,geo:geo,ext:{},
    events:[{k:'create',t:now,dur:dur}]};
  if(noteKind==='km'){
    const tokens=parseTokens(text);
    let tripKm=km>0?km:null;
    if(tokens.length){
      const isUnit=tokens.length>1;
      text=routeTextOf(tokens,isUnit?true:tripRound);
      if(km>0){
        if(isUnit){
          const p=loadPlaces();
          const key=tokens.join(' ');
          const en=p[key]||{km:0,n:0,t:0};
          en.km=fmtKm(km);en.n++;en.t=Date.now();en.u=1;
          p[key]=en;savePlaces(p);
          tripKm=km;
        }else{
          learnPlace(tokens[0],km);
          tripKm=tripRound?km*2:km;
        }
      }
    }
    rec.text=text;rec.km=tripKm?fmtKm(tripKm):null;
  }else if(noteKind==='list'&&lines.length){
    rec.items=lines.map(s=>({id:uid('i'),text:s,done:false,doneAt:null}));
    rec.text='';
  }else{
    rec.text=text;rec.kind='memo';
  }
  await notePut(rec);
  tEl.value='';kEl.value='';pendingAtts=[];focusT0=null;kmAuto=null;
  document.getElementById('nbDate').value=dateKeyOf(Date.now());
  renderPending();updateHint();
  if(noteKind==='km'){syncTrip();renderSuggest('');}
  toast(t('tLogged'));render();
}

let query='',viewTab=localStorage.getItem('viewTab')||'all',liveURLs=[];
document.getElementById('searchBox').addEventListener('input',e=>{

document.getElementById('viewTabs').onclick=e=>{

function qMatchNote(n){
  if(!query)return true;
  if((n.text||'').toLowerCase().includes(query))return true;
  if(n.items&&n.items.some(i=>i.text.toLowerCase().includes(query)))return true;
  if(n.atts&&n.atts.some(a=>(a.name||'').toLowerCase().includes(query)))return true;
  return false;
}
function qMatchRec(r){
  if(!query)return true;
  return (r.label||'').toLowerCase().includes(query)||(r.name||'').toLowerCase().includes(query)||r.dateKey.includes(query);
}
const isMemoKind=k=>k==='memo'||k==='list'||k==='note'||k==='appro';

/* ============ 渲染 ============ */
async function render(){
  document.querySelectorAll('.vtab').forEach(x=>x.classList.toggle('on',x.dataset.v===viewTab));
  liveURLs.forEach(u=>URL.revokeObjectURL(u));liveURLs=[];
  const all=(await dbAll()).sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||b.capturedAt-a.capturedAt);
  const notes=(await noteAll()).sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||b.capturedAt-a.capturedAt);
  const led=document.getElementById('ledger'),emp=document.getElementById('empty');
  led.innerHTML='';
  emp.style.display=(all.length||notes.length)?'none':'block';
  document.getElementById('exportAll').disabled=!(all.length||notes.length);

  const groups={},kgroups={},mgroups={};
  for(const r of all){if(!qMatchRec(r))continue;(groups[monthOf(r.dateKey)]=groups[monthOf(r.dateKey)]||[]).push(r);}
  for(const n of notes){
    if(n.kind==='km'){if(qMatchNote(n))(kgroups[monthOf(n.dateKey)]=kgroups[monthOf(n.dateKey)]||[]).push(n);}
    else if(isMemoKind(n.kind)){
      if(notesUnlocked&&!qMatchNote(n))continue;
      (mgroups[monthOf(n.dateKey)]=mgroups[monthOf(n.dateKey)]||[]).push(n);
    }
  }
  const months=[...new Set([...Object.keys(groups),...Object.keys(kgroups),...Object.keys(mgroups)])].sort().reverse();

  for(const mk of months){
    const rList=(viewTab==='all'||viewTab==='recu')?(groups[mk]||[]):[];
    const kList=(viewTab==='all'||viewTab==='km')?(kgroups[mk]||[]):[];
    const mList=(viewTab==='all'||viewTab==='memo')?(mgroups[mk]||[]):[];
    if(!rList.length&&!kList.length&&!mList.length)continue;
    const [y,m]=mk.split('-');
    const sec=document.createElement('div');sec.className='month';
    sec.innerHTML=
      '<div class="month-head"><div class="month-title">'+t('month',y,Number(m))+
      '<small>'+t('unit',rList.length,kList.length+mList.length)+'</small></div>'+
      '<button class="month-zip" data-mk="'+mk+'">ZIP ⬇</button></div>'+
      '<div class="month-tear"></div>';
    if(kList.length){
      const nl=document.createElement('div');nl.className='nlist';
      for(const n of kList){
        const row=document.createElement('div');row.className='nline';row.dataset.nid=n.id;
        row.innerHTML='<span class="nd">'+n.dateKey.slice(5)+'</span><span class="nk">🚗</span>'+
          '<span class="nt"></span>'+(n.km?'<span class="nkm">'+n.km+' km</span>':'');
        row.querySelector('.nt').textContent=n.text||'';
        nl.appendChild(row);
      }
      sec.appendChild(nl);
    }
    if(mList.length){
      if(!notesUnlocked&&localStorage.getItem('pinHash')){
        const lk=document.createElement('div');lk.className='nline';lk.style.color='var(--faded)';
        lk.dataset.lock='1';
        lk.innerHTML='<span class="nt">'+t('lockedNotes',mList.length)+'</span>';
        sec.appendChild(lk);
      }else if(!notesUnlocked&&!localStorage.getItem('pinHash')){
        const lk=document.createElement('div');lk.className='nline';lk.style.color='var(--faded)';
        lk.dataset.lock='1';
        lk.innerHTML='<span class="nt">'+t('lockedNotes',mList.length)+'</span>';
        sec.appendChild(lk);
      }else{
        for(const n of mList)sec.appendChild(buildNoteCard(n));
      }
    }
    if(rList.length){
      const grid=document.createElement('div');grid.className='grid';
      for(const r of rList){
        const d=document.createElement('div');d.dataset.id=r.id;
        if(r.type==='pdf'){
          d.className='thumb pdf';
          d.innerHTML='<div class="tag">PDF</div><div class="fn"></div><div class="d">'+r.dateKey.slice(5)+'</div>';
          d.querySelector('.fn').textContent=r.label||r.name||'document.pdf';
        }else{
          const u=URL.createObjectURL(r.thumb||r.blob);liveURLs.push(u);
          d.className='thumb';
          d.innerHTML='<img loading="lazy" src="'+u+'"><div class="d"></div>';
          d.querySelector('.d').textContent=r.label?r.label.slice(0,10):r.dateKey.slice(5);
        }
        grid.appendChild(d);
      }
      sec.appendChild(grid);
    }
    led.appendChild(sec);
  }
  const bytes=all.reduce((s,r)=>s+(r.size||0),0)
    +notes.reduce((s,n)=>s+((n.atts||[]).reduce((x,a)=>x+(a.size||0),0)),0);
  document.getElementById('storageInfo').textContent=t('info',all.length,notes.length,(bytes/1048576).toFixed(1));
  const oldest=Math.min(...all.map(r=>r.capturedAt),...notes.map(n=>n.capturedAt),Date.now());

        if(a.kind==='vref')d.insertAdjacentHTML('beforeend','<div class="vtag">▶</div>'+(a.dur?'<div class="vdur">'+Math.round(a.dur)+'s</div>':''));
        g.appendChild(d);

function updateBackupBanner(count,oldestTs){
  const el=document.getElementById('backupBanner');
  const last=Number(localStorage.getItem('lastExportAt')||0);
  if(!count){el.style.display='none';return;}
  const dataAge=oldestTs?Math.floor((Date.now()-oldestTs)/86400000):0;
  if(!last){
    if(dataAge<7){el.style.display='none';return;}
    el.style.display='block';el.className='';el.innerHTML=t('bannerNever');
  }else{
    const days=Math.floor((Date.now()-last)/86400000);
    el.style.display='block';
    if(days>=WARN_DAYS){el.className='';el.innerHTML=t('bannerLate',days);}
    else{el.className='ok';el.innerHTML=t('bannerOk',days);}
  }
}

/* ============ ZIP导出(会计域:票据+里程journal) ============ */
async function exportZip(monthKey){
  const all=(await dbAll()).filter(r=>!monthKey||monthOf(r.dateKey)===monthKey)
    .sort((a,b)=>a.dateKey.localeCompare(b.dateKey)||a.capturedAt-b.capturedAt);
  const kms=(await noteAll()).filter(n=>n.kind==='km'&&(!monthKey||monthOf(n.dateKey)===monthKey))
    .sort((a,b)=>a.dateKey.localeCompare(b.dateKey)||a.capturedAt-b.capturedAt);
  if(!all.length&&!kms.length){toast(t('tNothing'));return;}
  toast(t('tPacking'),60000);
  const zip=new JSZip();
  const seq={};
  const clean=s=>String(s||'').replace(/[\\\/:*?"<>|\s]+/g,'').slice(0,24);
  for(const r of all){
    seq[r.dateKey]=(seq[r.dateKey]||0)+1;
    const lbl=r.label?'_'+clean(r.label):'';
    zip.file(r.dateKey+'_'+pad(seq[r.dateKey])+lbl+(r.type==='pdf'?'.pdf':'.jpg'),r.blob);
  }
  if(kms.length){
    const esc=s=>'"'+String(s||'').replace(/"/g,'""')+'"';
    let csv='\uFEFFdate,trajet,km\n';
    for(const n of kms)csv+=n.dateKey+','+esc(n.text)+','+(n.km||'')+'\n';
    zip.file('journal_km_'+(monthKey||'TOUT')+'.csv',csv);
  }
  const blob=await zip.generateAsync({type:'blob'});
  dlBlob('justificatifs_'+(monthKey||'TOUT')+'_'+dateKeyOf(Date.now())+'.zip',blob);
  localStorage.setItem('lastExportAt',String(Date.now()));
  toast(t('tExported',all.length,kms.length));
  render();
}

async function serializeNote(n){
  const copy={...n};
  if(n.atts&&n.atts.length){
    copy.atts=[];
    for(const a of n.atts){
      copy.atts.push({...a,
        blob:a.blob?await blobToB64(a.blob):null,
        thumb:a.thumb?await blobToB64(a.thumb):null});
    }
  }
  return copy;
}
function reviveNote(n){
  if(n.atts)for(const a of n.atts){
    if(typeof a.blob==='string')a.blob=b64ToBlob(a.blob,a.mime);
    if(typeof a.thumb==='string')a.thumb=b64ToBlob(a.thumb,'image/jpeg');
  }
  if(!n.capturedAt)n.capturedAt=n.createdAt||Date.now();
  if(n.kind==='note')n.kind='memo';
  if(!n.events)n.events=[];
  if(!('atts' in n))n.atts=[];
  return n;
}

document.getElementById('bkFile').onchange=async e=>{
  const f=e.target.files[0];e.target.value='';
  if(!f)return;
  try{
    toast(t('tPacking'),120000);
    const data=JSON.parse(await f.text());
    let added=0,merged=0,skipped=0;
    const haveR=new Set((await dbAll()).map(r=>r.id));
    const existN=await noteAll();
    const haveN=new Map(existN.map(n=>[n.id,n]));
    if(data.app==='kouunn-vault'||data.app==='recu-vault'){
      for(const r of (data.receipts||[])){
        if(!r.id||haveR.has(r.id)){skipped++;continue;}
        await dbPut({id:r.id,capturedAt:r.capturedAt,dateKey:r.dateKey,type:r.type,name:r.name,
          label:r.label||'',size:r.size,
          blob:b64ToBlob(r.blob,r.mime),
          thumb:r.thumb?b64ToBlob(r.thumb,'image/jpeg'):null});
        added++;
      }
      if(data.places){
        const mine=loadPlaces();
        for(const k in data.places){
          if(!mine[k]||(data.places[k].t||0)>(mine[k].t||0))mine[k]=data.places[k];
        }
        savePlaces(mine);
      }
    }else if(data.app!=='inbox'){toast(t('tBadFile'));return;}
    for(const raw of (data.notes||[])){
      if(!raw.id){skipped++;continue;}
      const n=reviveNote(raw);
      const mine=haveN.get(n.id);
      if(!mine){await notePut(n);added++;}
      else{
        const seen=new Set((mine.events||[]).map(ev=>ev.k+'|'+ev.t));
        let grew=false;
        for(const ev of (n.events||[])){
          if(!seen.has(ev.k+'|'+ev.t)){mine.events.push(ev);grew=true;}
        }
        if(n.items&&mine.items){
          const mIds=new Set(mine.items.map(i=>i.id));
          for(const it of n.items)if(!mIds.has(it.id)){mine.items.push(it);grew=true;}
        }
        if(grew){mine.events.sort((a,b)=>a.t-b.t);await notePut(mine);merged++;}
        else skipped++;
      }
    }
    toast(t('tImp',added,merged,skipped),3200);
    render();
  }catch(err){console.error(err);toast(t('tBadFile'));}
};

document.getElementById('rmSheet').onclick=e=>{if(e.target.id==='rmSheet')closeSheet('rmSheet');};
document.getElementById('rmWhen').addEventListener('input',syncRmButtons);
document.querySelectorAll('.rq').forEach(b=>b.onclick=()=>{
  const now=new Date();let d;
  if(b.dataset.q==='1h')d=new Date(Date.now()+3600000);
  else if(b.dataset.q==='tonight'){d=new Date();d.setHours(20,0,0,0);if(d<now)d.setDate(d.getDate()+1);}
  else{d=new Date();d.setDate(d.getDate()+1);d.setHours(9,0,0,0);}
  document.getElementById('rmWhen').value=dtLocal(d);
  syncRmButtons();
});
document.getElementById('rmOffsets').onclick=e=>{
  const c=e.target.closest('.ro');if(!c)return;
  c.classList.toggle('on');
  const sel=[...document.querySelectorAll('.ro.on')].map(x=>Number(x.dataset.m));
  saveOffsets(sel.length?sel:[0]);
};
async function logRemind(mode,at){
  if(!remNote)return;
  if(!remNote.events)remNote.events=[];
  remNote.events.push({k:'remind',t:Date.now(),at:at,mode:mode});
  await notePut(remNote);render();
}
document.getElementById('rmAlarm').onclick=async()=>{
  const v=document.getElementById('rmWhen').value;
  if(!v){toast(t('pickTime'));return;}
  const d=new Date(v);
  await logRemind('alarm',d.getTime());
  closeSheet('rmSheet');closeNoteEdit();
  location.href='intent:#Intent;action=android.intent.action.SET_ALARM;'+
    'i.android.intent.extra.alarm.HOUR='+d.getHours()+';'+
    'i.android.intent.extra.alarm.MINUTES='+d.getMinutes()+';'+
    'S.android.intent.extra.alarm.MESSAGE='+encodeURIComponent(noteTitle(remNote))+';end';
};
document.getElementById('rmIcs').onclick=async()=>{
  const v=document.getElementById('rmWhen').value;
  if(!v){toast(t('pickTime'));return;}
  const d=new Date(v);
  const end=new Date(d.getTime()+1800000);
  const fmt=x=>x.getFullYear()+pad(x.getMonth()+1)+pad(x.getDate())+'T'+pad(x.getHours())+pad(x.getMinutes())+'00';
  const esc=s=>String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  let alarms='';
  for(const m of loadOffsets()){
    alarms+='BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:KOUUNN\r\nTRIGGER:-PT'+m+'M\r\nEND:VALARM\r\n';
  }
  const body=remNote.kind==='list'&&remNote.items
    ?remNote.items.map(i=>(i.done?'[x] ':'[ ] ')+i.text).join('\\n')
    :esc(remNote.text||'');
  const ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//KOUUNN//APP\r\nBEGIN:VEVENT\r\n'+
    'UID:'+uid('rm')+'@kouunn\r\nDTSTAMP:'+fmt(new Date())+'\r\n'+
    'DTSTART:'+fmt(d)+'\r\nDTEND:'+fmt(end)+'\r\n'+
    'SUMMARY:'+esc(noteTitle(remNote))+'\r\nDESCRIPTION:'+body+'\r\n'+
    alarms+'END:VEVENT\r\nEND:VCALENDAR\r\n';
  await logRemind('ics',d.getTime());
  closeSheet('rmSheet');
  dlBlob('reminder_'+dateKeyOf(d.getTime())+'.ics',new Blob([ics],{type:'text/calendar'}));
  toast(t('icsDone'),2800);
};

/* ============ 月结拦截 ============ */
async function checkMonthGate(){
  const now=new Date();
  const curMonthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  const prevKey=prev.getFullYear()+'-'+pad(prev.getMonth()+1);
  const all=await dbAll(),notes=await noteAll();
  const hasOld=all.some(r=>monthOf(r.dateKey)<=prevKey)||notes.some(n=>monthOf(n.dateKey)<=prevKey);
  const last=Number(localStorage.getItem('lastExportAt')||0);
  const snoozed=localStorage.getItem('gateSnooze')===dateKeyOf(Date.now());
  if(hasOld&&last<curMonthStart&&!snoozed){
    document.getElementById('gateTitle').textContent=t('gateTitle',prev.getMonth()+1);
    document.getElementById('closeGate').classList.add('open');
  }
}
document.getElementById('gateExport').onclick=async()=>{
  document.getElementById('closeGate').classList.remove('open');
  await exportZip(null);
};
document.getElementById('gateLater').onclick=()=>{
  localStorage.setItem('gateSnooze',dateKeyOf(Date.now()));
  document.getElementById('closeGate').classList.remove('open');
};

document.getElementById('galInput').onchange=e=>{ingest([...e.target.files],true,false);e.target.value='';};

async function askPersist(){
  const tag=document.getElementById('persistTag');
  if(!navigator.storage||!navigator.storage.persist){tag.textContent='';return;}
  let p=await navigator.storage.persisted();
  if(!p)p=await navigator.storage.persist();
  tag.textContent=p?t('persistOn'):t('persistOff');
  tag.style.color=p?'var(--ok)':'var(--tampon)';
}
(async()=>{
  applyLang();
  document.getElementById('nbDate').value=dateKeyOf(Date.now());
  await openDB();
  await render();
  askPersist();
  checkMonthGate();
})();
